    <style>
        :root {

            --accent-primary: #3b82f6;

            --border-color: #2d2f36;

        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;

            flex-wrap: wrap;

            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--control-bg);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .controls label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
        }

        select {
            background: transparent;
            color: var(--text-primary);
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            padding: 4px;
        }

        .stats {
            display: flex;
            gap: 24px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .stat-item span {
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .histogram-wrapper {
            height: 700px;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .histogram-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .histogram-wrapper::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            flex: 1;
            min-height: 0;
            cursor: crosshair;
        }

        .price-label {
            width: 120px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            margin-right: 16px;
        }

        .bar-container {
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .bar {
            height: 80%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 0 2px 2px 0;
            position: relative;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
            opacity: 0.6;
        }

        .row:hover .bar {
            opacity: 1;
            transform: scaleY(1.1);
        }

        .row:hover .price-label {
            color: var(--text-primary);
        }

        .row.is-poc .bar {
            background: linear-gradient(90deg, var(--poc-color), #fbbf24);
            opacity: 1;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
        }

        .row.is-poc .price-label {
            color: var(--poc-color);
            font-weight: 600;
        }

        .count-tooltip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            margin-left: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .row:hover .count-tooltip {
            opacity: 1;
        }

        .legend {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .legend-group {
            display: flex;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>

        };

        function aggregateData(level) {
            if (level === 'raw') return rawData;

            const interval = parseFloat(level);
            const aggregated = {};

            Object.entries(rawData).forEach(([price, count]) => {
                const bucketPrice = Math.floor(parseFloat(price) / interval) * interval;
                const bucketKey = bucketPrice.toFixed(2);
                aggregated[bucketKey] = (aggregated[bucketKey] || 0) + count;
            });

            return aggregated;
        }

        function render(aggLevel) {
            const data = aggregateData(aggLevel);
            const histogramEl = document.getElementById('histogram');
            histogramEl.innerHTML = ''; // Clear previous

            const sortedPrices = Object.keys(data).sort((a, b) => parseFloat(b) - parseFloat(a));
            const counts = Object.values(data);
            const maxCount = Math.max(...counts);
            const totalTpo = counts.reduce((a, b) => a + b, 0);

            const minPrice = Math.min(...Object.keys(rawData).map(Number)).toFixed(2);
            const maxPrice = Math.max(...Object.keys(rawData).map(Number)).toFixed(2);

            let pocPrice = "";
            let maxVal = -1;

            // Find POC
            sortedPrices.forEach(price => {
                if (data[price] > maxVal) {
                    maxVal = data[price];
                    pocPrice = price;
                }
            });

            // Update Stats
            document.getElementById('poc-stat').innerHTML = `<span>POC:</span> ${aggLevel === 'raw' ? pocPrice : '$' + pocPrice + ' - ' + (parseFloat(pocPrice) + parseFloat(aggLevel)).toFixed(2)}`;
            document.getElementById('range-stat').innerHTML = `<span>Range:</span> ${minPrice} - ${maxPrice}`;
            document.getElementById('total-stat').innerHTML = `<span>Total TPO:</span> ${totalTpo.toLocaleString()}`;
            document.getElementById('item-count').textContent = `${sortedPrices.length} Levels`;

            // Render Bars
            const containerHeight = 700;
            const rowCount = sortedPrices.length;
            const labelHeight = 14; // Approximate height of a label
            const labelStep = Math.max(1, Math.ceil((labelHeight * rowCount) / containerHeight));

            sortedPrices.forEach((price, index) => {
                const count = data[price];
                const widthPct = (count / maxCount) * 100;
                const isPoc = price === pocPrice;

                const row = document.createElement('div');
                row.className = `row ${isPoc ? 'is-poc' : ''}`;

                // Show label only if it fits the step, or if it's the first/last/POC
                const showLabel = (index % labelStep === 0) || isPoc || index === rowCount - 1;
                const labelText = showLabel ? parseFloat(price).toFixed(aggLevel === 'raw' ? 2 : 0) : '';

                row.innerHTML = `
                    <div class="price-label" style="visibility: ${showLabel ? 'visible' : 'hidden'}">${labelText}</div>
                    <div class="bar-container">
                        <div class="bar" style="width: ${widthPct}%"></div>
                        <div class="count-tooltip">${count.toLocaleString()} TPO (${((count / totalTpo) * 100).toFixed(1)}%)</div>
                    </div>
                `;

                histogramEl.appendChild(row);
            });
        }

        // Event Listeners
        document.getElementById('agg-selector').addEventListener('change', (e) => {
            render(e.target.value);
        });

        // Initial Load
        render('raw');
    </script>
